<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
</head>
<body>
    <script type="text/javascript">
        var counter;
        counter = 1;
        var total = 0;

        while(counter <= 10){
            var input = prompt('Masukkan angka ke ' + counter);
            total += Number(input);
            counter++;
        }
        console.log('Total dari 10 angka yang dimasukkan adalah ' + total);

    </script>
</body>
</html>
