<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
</head>
<body>
    <script type="text/javascript">
        var input;

        for(var counter = 1; counter <= 3; counter++){
            input = prompt('Masukkan Nama Pokemon');
            if(input === 'pikachu' || input === 'raichu'|| input === 'elekid' ){
                console.log(input + ' is an electric type pokemon');
            }
            if(input === 'squirtle' || input === 'lapras'|| input === 'greninja' ){
                console.log(input + ' is a water type pokemon');
            }
        }





    </script>
</body>
</html>
