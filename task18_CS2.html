<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
</head>
<body>
    <script type="text/javascript">
        var total = 0;
        var input;
        var number;

        while(true){
            input = prompt('Masukkan angka (ketik -1 untuk STOP)');
            if(input === '-1'){
                break;
            }
            number = Number(input);
            total += number;
        }
        console.log('Total dari angka yang diinputkan adalah ' + total);
    </script>
</body>
</html>
